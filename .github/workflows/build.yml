name: Build firmware

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [esp32s3, esp32]
    steps:
      - uses: actions/checkout@v4
      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: ${{ matrix.target }}
          path: firmware
