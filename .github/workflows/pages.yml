name: Deploy web flasher

on:
  push:
    branches: [main]
    paths: ['web/**']
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bundle firmware binaries from the latest release
        # GitHub release downloads lack CORS headers, so the browser cannot
        # fetch them directly. Serving the binaries from the same origin as
        # the flasher page removes the problem entirely.
        run: |
          mkdir -p web/firmware
          gh release download --pattern 'animus-*.bin' --dir web/firmware
          ls -la web/firmware
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
